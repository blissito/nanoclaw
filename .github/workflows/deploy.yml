name: Deploy

on:
  push:
    branches: [skill/easybits]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          HOST: ${{ secrets.DROPLET_IP }}
        run: |
          mkdir -p ~/.ssh
          echo "$KEY_B64" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -s' << 'SCRIPT'
          set -e
          cd /home/nanoclaw/app

          # Pull latest
          sudo -u nanoclaw git pull origin skill/easybits

          # Install & build
          sudo -u nanoclaw npm install
          sudo -u nanoclaw npm run build

          # Rebuild agent container
          sudo -u nanoclaw ./container/build.sh

          # Restart service
          systemctl restart nanoclaw

          # Verify
          sleep 3
          systemctl is-active nanoclaw
          echo "Deploy complete"
          SCRIPT

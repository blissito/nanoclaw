name: Deploy

on:
  push:
    branches: [skill/easybits]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        run: ssh-keyscan -H ${{ secrets.DROPLET_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -s' << 'SCRIPT'
          set -e
          cd /home/nanoclaw/app

          # Pull latest
          sudo -u nanoclaw git pull origin skill/easybits

          # Install & build
          sudo -u nanoclaw npm install
          sudo -u nanoclaw npm run build

          # Rebuild agent container
          sudo -u nanoclaw ./container/build.sh

          # Restart service
          systemctl restart nanoclaw

          # Verify
          sleep 3
          systemctl is-active nanoclaw
          echo "Deploy complete"
          SCRIPT
